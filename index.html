<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NJ School Funding Dashboard — FY2027 K–12 State Aid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--surface:#fff;--text:#1a1a2e;--text-muted:#5a5f7a;
  --accent:#E54B22;--accent-hover:#cc3d18;--green:#BCD031;--green-dark:#96a727;
  --dark:#4a4a5a;--border:#e2e4ea;--shadow:0 2px 12px rgba(0,0,0,.06);
  --radius:10px;--radius-sm:6px;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Libre Franklin',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}

/* HEADER */
.site-header{background:var(--dark);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.site-header img{height:40px;width:auto}
.site-header .tagline{color:rgba(255,255,255,.65);font-size:.75rem;letter-spacing:.5px;text-transform:uppercase;font-weight:600}

/* HERO */
.hero{background:linear-gradient(135deg,var(--dark) 0%,#2d2d3a 100%);color:#fff;padding:40px 24px 32px;text-align:center}
.hero h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.hero .subtitle{color:rgba(255,255,255,.7);font-size:.95rem;font-weight:400}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;max-width:1200px;margin:-28px auto 24px;padding:0 20px;position:relative;z-index:10}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px 18px;box-shadow:var(--shadow);border-top:3px solid var(--green);text-align:center}
.stat-card .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);font-weight:600;margin-bottom:4px}
.stat-card .value{font-size:1.6rem;font-weight:800;color:var(--text)}
.stat-card .sub{font-size:.78rem;color:var(--accent);font-weight:600;margin-top:2px}

/* CONTROLS */
.controls-wrap{max-width:1200px;margin:0 auto 20px;padding:0 20px}
.toggle-bar{display:flex;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.toggle-btn{flex:1;padding:12px;text-align:center;font-weight:700;font-size:.85rem;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:all .2s;font-family:inherit;letter-spacing:.3px}
.toggle-btn.active{background:var(--accent);color:#fff}
.toggle-btn:hover:not(.active){background:rgba(229,75,34,.08)}

.filter-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filter-row select,.filter-row input{font-family:inherit;font-size:.85rem;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);transition:border-color .2s;min-width:0}
.filter-row select:focus,.filter-row input:focus{outline:none;border-color:var(--accent)}
.filter-row select{cursor:pointer;flex:0 1 220px}
.filter-row input{flex:1 1 200px}
.filter-row .rank-btn{font-family:inherit;font-size:.82rem;padding:10px 18px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s}
.filter-row .rank-btn:hover{background:var(--accent-hover)}
.rank-dir{font-size:.82rem;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-family:inherit;color:var(--text)}

/* TABLE */
.table-wrap{max-width:1200px;margin:0 auto 40px;padding:0 20px}
.table-container{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead{position:sticky;top:0;z-index:5}
th{background:#f0f1f5;color:var(--text);font-weight:700;padding:12px 10px;text-align:right;white-space:nowrap;border-bottom:2px solid var(--border);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;transition:background .15s}
th:hover{background:#e4e6ed}
th:first-child,th:nth-child(2){text-align:left}
th .sort-arrow{margin-left:3px;opacity:.4;font-size:.65rem}
th.sorted .sort-arrow{opacity:1;color:var(--accent)}
td{padding:10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
td:first-child,td:nth-child(2){text-align:left;font-weight:600;color:var(--text)}
tr:hover td{background:rgba(188,208,49,.06)}
.pct-bar{display:inline-block;height:6px;border-radius:3px;vertical-align:middle;margin-right:6px;min-width:2px}
.pct-pos{background:var(--green)}
.pct-neg{background:var(--accent)}

.row-count{padding:12px 16px;font-size:.78rem;color:var(--text-muted);font-weight:500;border-top:1px solid var(--border);text-align:right}

/* FOOTER */
.site-footer{background:var(--dark);color:rgba(255,255,255,.55);text-align:center;padding:20px;font-size:.72rem}
.site-footer strong{color:rgba(255,255,255,.85)}

/* MOBILE */
@media(max-width:700px){
  .hero{padding:28px 16px 24px}
  .stats-row{grid-template-columns:1fr 1fr;gap:10px;margin-top:-20px;padding:0 12px}
  .stat-card{padding:14px 10px}
  .stat-card .value{font-size:1.15rem}
  .controls-wrap,.table-wrap{padding:0 12px}
  .filter-row{flex-direction:column}
  .filter-row select,.filter-row input{flex:1 1 100%;width:100%}
  table{font-size:.75rem}
  td,th{padding:8px 6px}
}
@media(max-width:420px){
  .stats-row{grid-template-columns:1fr;gap:8px}
}
</style>
</head>

// Expand compact keys
const FIELDS={c:'county',d:'district',a:'fy26',b:'equalization',e:'edAdequacy',f:'choice',g:'transportation',h:'specialEd',i:'security',j:'vocational',k:'military',l:'fy27',m:'difference',n:'pctChange'};
function expand(r){const o={};for(const[k,v]of Object.entries(r)){o[FIELDS[k]||k]=v}return o}
const DATA={
  districts:RAW.d.map(expand),
  counties:RAW.co.map(expand),
  state:expand(RAW.s)
};

let currentView='district';
let currentCounty='all';
let sortCol=null;
let sortDir='desc';
let searchTerm='';
let rankMetric='fy27';
let rankDir='desc';

const COLS_COUNTY=[
  {key:'county',label:'County',fmt:'text'},
  {key:'fy26',label:'FY26 K–12 Aid',fmt:'dollar'},

const COLS_DISTRICT=[

  {key:'pctChange',label:'% Change',fmt:'pct'},
  {key:'fy27',label:'FY27 K–12 Aid',fmt:'dollar'},
  {key:'difference',label:'FY26–27 Difference',fmt:'dollar_sign'},
  {key:'fy26',label:'FY26 K–12 Aid',fmt:'dollar'},

];

function fmtDollar(v){if(v==null)return'—';return'$'+Math.abs(v).toLocaleString('en-US',{maximumFractionDigits:0})}
function fmtDollarSign(v){if(v==null)return'—';const s=v<0?'−$':'$';return s+Math.abs(v).toLocaleString('en-US',{maximumFractionDigits:0})}
function fmtDollarAbbrev(v){if(v==null)return'—';const a=Math.abs(v);const s=v<0?'−$':'$';if(a>=1e9)return s+(a/1e9).toFixed(1)+' billion';if(a>=1e6)return s+(a/1e6).toFixed(1)+' million';return s+a.toLocaleString('en-US',{maximumFractionDigits:0})}
function fmtPct(v){if(v==null)return'—';return(v>=0?'+':'')+((v)*100).toFixed(2)+'%'}
function fmtCell(v,fmt){
  if(fmt==='text')return v||'—';
  if(fmt==='dollar')return fmtDollar(v);
  if(fmt==='dollar_sign')return fmtDollarSign(v);
  if(fmt==='pct')return fmtPct(v);
  return v;
}

// Stats row
function renderStats(){
  const s=DATA.state;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="label">FY2027 Total K–12 Aid</div><div class="value">${fmtDollarAbbrev(s.fy27)}</div></div>
    <div class="stat-card"><div class="label">FY2026 Total K–12 Aid</div><div class="value">${fmtDollarAbbrev(s.fy26)}</div></div>
    <div class="stat-card"><div class="label">Year-Over-Year Change</div><div class="value">${fmtDollarAbbrev(s.difference)}</div><div class="sub">${fmtPct(s.pctChange)}</div></div>
    <div class="stat-card"><div class="label">Districts Statewide</div><div class="value">${DATA.districts.length}</div><div class="sub">21 Counties</div></div>
  `;
}

// Filter controls
function renderFilters(){
  const fr=document.getElementById('filterRow');
  if(currentView==='county'){
    fr.innerHTML=`
      <input type="text" placeholder="Search counties…" id="searchBox" oninput="searchTerm=this.value;renderTable()">
    `;
  }else{
    const counties=Array.from(new Set(DATA.districts.map(d=>d.county))).sort();
    fr.innerHTML=`
      <select id="countyFilter" onchange="currentCounty=this.value;renderTable()">
        <option value="all">All Counties</option>
        ${counties.map(c=>`<option value="${c}"${c===currentCounty?' selected':''}>${c}</option>`).join('')}
      </select>
      <input type="text" placeholder="Search districts…" id="searchBox" oninput="searchTerm=this.value;renderTable()">
    `;
  }
}

function switchView(v){
  currentView=v;
  searchTerm='';
  sortCol=null;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  renderFilters();
  renderTable();
}

function renderTable(){
  const cols=currentView==='county'?COLS_COUNTY:COLS_DISTRICT;
  let rows=currentView==='county'?[...DATA.counties]:[...DATA.districts];

  // Filter by county (district view)
  if(currentView==='district'&&currentCounty!=='all'){
    rows=rows.filter(r=>r.county===currentCounty);
  }

  // Search
  if(searchTerm){
    const q=searchTerm.toLowerCase();
    rows=rows.filter(r=>{
      const name=currentView==='county'?r.county:(r.district+' '+r.county);
      return name.toLowerCase().includes(q);
    });
  }

  // Sort
  if(sortCol){
    rows.sort((a,b)=>{
      let va=a[sortCol],vb=b[sortCol];
      if(typeof va==='string')va=va.toLowerCase();
      if(typeof vb==='string')vb=vb.toLowerCase();
      if(va<vb)return sortDir==='asc'?-1:1;
      if(va>vb)return sortDir==='asc'?1:-1;
      return 0;
    });
  }

  // Header
  const thead=document.querySelector('#mainTable thead');
  thead.innerHTML='<tr>'+
    (sortCol?'<th style="width:40px;text-align:center;cursor:default">#</th>':'')+
    cols.map(c=>{
      const isSorted=sortCol===c.key;
      const arrow=isSorted?(sortDir==='asc'?'▲':'▼'):'⇅';
      return `<th class="${isSorted?'sorted':''}" onclick="headerSort('${c.key}')">${c.label} <span class="sort-arrow">${arrow}</span></th>`;
    }).join('')+'</tr>';

  // Body
  const tbody=document.querySelector('#mainTable tbody');
  const maxPct=Math.max(...rows.map(r=>Math.abs(r.pctChange||0)),0.001);
  let html='';
  rows.forEach((r,i)=>{
    const cls=r.difference>0?'positive':r.difference<0?'negative':'';
    html+='<tr class="'+cls+'">';
    if(sortCol) html+=`<td style="text-align:center;color:var(--text-muted);font-weight:700;font-size:.75rem">${i+1}</td>`;
    cols.forEach(c=>{
      if(c.key==='pctChange'){
        const w=Math.round((Math.abs(r.pctChange||0)/maxPct)*40);
        const barCls=r.pctChange>=0?'pct-pos':'pct-neg';
        html+=`<td><span class="pct-bar ${barCls}" style="width:${w}px"></span>${fmtPct(r.pctChange)}</td>`;
      }else{
        html+=`<td>${fmtCell(r[c.key],c.fmt)}</td>`;
      }
    });
    html+='</tr>';
  });
  tbody.innerHTML=html;

  // Count
  const scope=currentView==='district'&&currentCounty!=='all'?currentCounty+' County':'Statewide';
  document.getElementById('rowCount').textContent=`Showing ${rows.length} ${currentView==='county'?'counties':'districts'} — ${scope}`;
}

function headerSort(key){
  if(sortCol===key){sortDir=sortDir==='asc'?'desc':'asc'}
  else{sortCol=key;sortDir=key==='county'||key==='district'?'asc':'desc'}
  renderTable();
}

// Init
renderStats();
renderFilters();
renderTable();
</script>
